version: "3.8"

# ============================================================
# Atendechat v4.10.8 — Docker Swarm Stack com Traefik
# Frontend : https://zap.cwautomacoes.space
# Backend  : https://api.zap.cwautomacoes.space
# ============================================================

services:

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: atendechat
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: atendechat
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - atendechat_net
    deploy:
      restart_policy:
        condition: any

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASS}
    volumes:
      - redis_data:/data
    networks:
      - atendechat_net
    deploy:
      restart_policy:
        condition: any

  backend:
    image: atendechat-backend-v2:latest
    command: sh -c "npx sequelize db:migrate && node dist/server.js"
    environment:
      NODE_ENV: production
      BACKEND_URL: https://api.zap.cwautomacoes.space
      FRONTEND_URL: https://zap.cwautomacoes.space
      PROXY_PORT: "443"
      PORT: "8080"

      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: atendechat
      DB_PASS: ${DB_PASS}
      DB_NAME: atendechat
      DB_POOL_MAX: "100"
      DB_POOL_MIN: "15"
      DB_POOL_ACQUIRE: "30000"
      DB_POOL_IDLE: "600000"

      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}

      REDIS_URI: redis://:${REDIS_PASS}@redis:6379
      REDIS_OPT_LIMITER_MAX: "1"
      REDIS_OPT_LIMITER_DURATION: "3000"

      SOCKET_ADMIN: "true"
      USER_LIMIT: "10000"
      CONNECTIONS_LIMIT: "100000"
      CLOSED_SEND_BY_ME: "true"
      VERIFY_TOKEN: "whaticket"

      # API Oficial WhatsApp (Meta)
      USE_WHATSAPP_OFICIAL: "true"
      URL_API_OFICIAL: https://novocodigo.atendechat.com
      TOKEN_API_OFICIAL: ${TOKEN_API_OFICIAL}

      FACEBOOK_APP_ID: ""
      FACEBOOK_APP_SECRET: ""
    volumes:
      - atendechat_uploads:/app/public
      - atendechat_sessions:/app/.wwebjs_auth
    networks:
      - atendechat_net
      - cw-automacoes
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.atendechat-api.rule=Host(`api.zap.cwautomacoes.space`)"
        - "traefik.http.routers.atendechat-api.entrypoints=websecure"
        - "traefik.http.routers.atendechat-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.atendechat-api.loadbalancer.server.port=8080"
        - "traefik.docker.network=cw-automacoes"

  frontend:
    image: atendechat-frontend-v2:latest
    networks:
      - cw-automacoes
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.atendechat-web.rule=Host(`zap.cwautomacoes.space`)"
        - "traefik.http.routers.atendechat-web.entrypoints=websecure"
        - "traefik.http.routers.atendechat-web.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.atendechat-web.loadbalancer.server.port=80"
        - "traefik.docker.network=cw-automacoes"

volumes:
  pg_data:
    external: true
    name: atendechat_atendechat_postgres
  redis_data:
    external: true
    name: atendechat_atendechat_redis
  atendechat_uploads:
    external: true
    name: atendechat_atendechat_uploads
  atendechat_sessions:
    external: true
    name: atendechat_atendechat_sessions

networks:
  atendechat_net:
    driver: overlay
  cw-automacoes:
    external: true
